services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      GLAVRED_API_HOST: 0.0.0.0
      GLAVRED_API_PORT: 8000
      GLAVRED_CORS_ORIGINS: http://localhost:5176,http://127.0.0.1:5176
      OPENROUTER_HTTP_REFERER: http://localhost:5176
    ports:
      - "8000:8000"
    volumes:
      - ./var:/app/var
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 60s
      timeout: 3s
      retries: 6

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5176:5173"
    depends_on:
      backend:
        condition: service_healthy
