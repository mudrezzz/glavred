services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      GLAVRED_API_HOST: 0.0.0.0
      GLAVRED_API_PORT: 8000
      GLAVRED_CORS_ORIGINS: http://localhost:5176,http://127.0.0.1:5176
      OPENROUTER_HTTP_REFERER: http://localhost:5176
      REDIS_URL: redis://redis:6379/0
      DRAFT_RUN_DB_PATH: var/glavred-draft-runs.sqlite3
      SQLITE_JOURNAL_MODE: DELETE
    ports:
      - "8000:8000"
    volumes:
      - ./var:/app/var
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 60s
      timeout: 3s
      retries: 6
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: celery -A backend.app.infrastructure.celery_app worker --loglevel=INFO --pool=solo
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DRAFT_RUN_DB_PATH: var/glavred-draft-runs.sqlite3
      SQLITE_JOURNAL_MODE: DELETE
    volumes:
      - ./var:/app/var
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5176:5173"
    depends_on:
      backend:
        condition: service_healthy
