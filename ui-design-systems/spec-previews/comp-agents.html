<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--paper);}
  .lab{font:var(--mono-sm);text-transform:uppercase;letter-spacing:.1em;color:var(--ink-400);margin-bottom:12px;}
  .row{display:flex;flex-wrap:wrap;gap:18px;align-items:center;}
  .ag{display:flex;align-items:center;gap:10px;}
  .av{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font:var(--mono-md);font-weight:600;flex:none;}
  .nm{display:flex;flex-direction:column;}
  .nm b{font:var(--ui-sm);font-weight:600;color:var(--ink-900);}
  .nm span{font:var(--mono-sm);color:var(--ink-500);}
</style></head>
<body class="gr-ui">
  <div class="lab">Агенты редакции — моно-инициалы в тонированных чипах</div>
  <div class="row">
    <div class="ag"><div class="av" style="background:var(--info-tint);color:var(--info-ink);">СК</div><div class="nm"><b>Скаут</b><span>signals</span></div></div>
    <div class="ag"><div class="av" style="background:var(--accent-tint);color:var(--accent-ink);">ГР</div><div class="nm"><b>Главред</b><span>orchestrator</span></div></div>
    <div class="ag"><div class="av" style="background:var(--warn-tint);color:var(--warn-ink);">ФЧ</div><div class="nm"><b>Фактчекер</b><span>facts</span></div></div>
    <div class="ag"><div class="av" style="background:var(--ink-100);color:var(--ink-700);">СТ</div><div class="nm"><b>Стиль-редактор</b><span>voice</span></div></div>
    <div class="ag"><div class="av" style="background:var(--ok-tint);color:var(--ok-ink);">АА</div><div class="nm"><b>Анти-AI</b><span>de-slop</span></div></div>
  </div>
</body></html>
