<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:26px 28px;background:var(--paper);}
  .row{display:flex;align-items:center;gap:28px;}
  .lockup{display:flex;align-items:center;gap:14px;}
  .wm{font:var(--ed-h1);font-weight:700;color:var(--ink-900);letter-spacing:-0.01em;}
  .lab{font:var(--mono-sm);text-transform:uppercase;letter-spacing:.1em;color:var(--ink-500);margin-top:14px;}
  .chip{display:flex;flex-direction:column;align-items:center;gap:8px;}
</style></head>
<body class="gr-ui">
  <div class="row">
    <div class="lockup">
      <img src="../assets/logo-mark.svg" width="58" height="58" alt="">
      <span class="wm">Главред</span>
    </div>
    <div class="chip"><img src="../assets/logo-mark.svg" width="48" height="48" alt=""><span class="lab">mark</span></div>
    <div class="chip"><img src="../assets/logo-mark-outline.svg" width="48" height="48" alt=""><span class="lab">outline</span></div>
    <div class="chip" style="background:#211D19;padding:14px;border-radius:14px;"><img src="../assets/logo-mark.svg" width="40" height="40" alt=""></div>
  </div>
  <div class="lab">Логотип — геометрическая засечная «Г» + корректорский знак вставки (киноварь)</div>
</body></html>
