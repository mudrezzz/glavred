<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:26px 28px;background:var(--surface);}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .mk{font:var(--mono-sm);text-transform:uppercase;letter-spacing:.12em;color:var(--ink-600);background:var(--surface-sunk);border:1px solid var(--ink-200);padding:5px 9px;border-radius:var(--r-sm);}
  .mk.acc{color:var(--accent-ink);background:var(--accent-wash);border-color:var(--accent-tint);}
  .score{font:var(--mono-md);color:var(--ink-800);background:var(--ink-100);padding:4px 8px;border-radius:var(--r-sm);}
  .meta{font:var(--mono-sm);text-transform:uppercase;letter-spacing:.1em;color:var(--ink-500);margin-top:18px;}
</style></head>
<body class="gr-ui">
  <div class="row">
    <span class="mk">Рубрика</span>
    <span class="mk">Скоринг</span>
    <span class="mk acc">HITL · Gate 2</span>
    <span class="score">релевантность 0.86</span>
    <span class="score">новизна 0.71</span>
    <span class="score">риск ↓ 0.12</span>
  </div>
  <div class="meta">JetBrains Mono · marks 11/.12em · scores 13 · системные метки и оценки</div>
</body></html>
