<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:26px 28px;background:var(--surface);}
  .scale{display:flex;align-items:flex-end;gap:14px;}
  .u{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--accent);border-radius:3px;width:22px;}
  .n{font:var(--mono-sm);color:var(--ink-500);}
  .meta{font:var(--mono-sm);text-transform:uppercase;letter-spacing:.1em;color:var(--ink-500);margin-top:18px;}
</style></head>
<body class="gr-ui">
  <div class="scale">
    <div class="u"><div class="bar" style="height:4px"></div><span class="n">1·4</span></div>
    <div class="u"><div class="bar" style="height:8px"></div><span class="n">2·8</span></div>
    <div class="u"><div class="bar" style="height:12px"></div><span class="n">3·12</span></div>
    <div class="u"><div class="bar" style="height:16px"></div><span class="n">4·16</span></div>
    <div class="u"><div class="bar" style="height:20px"></div><span class="n">5·20</span></div>
    <div class="u"><div class="bar" style="height:24px"></div><span class="n">6·24</span></div>
    <div class="u"><div class="bar" style="height:32px"></div><span class="n">8·32</span></div>
    <div class="u"><div class="bar" style="height:40px"></div><span class="n">10·40</span></div>
    <div class="u"><div class="bar" style="height:48px"></div><span class="n">12·48</span></div>
    <div class="u"><div class="bar" style="height:64px"></div><span class="n">16·64</span></div>
  </div>
  <div class="meta">Шаг 4px · интерфейс дышит · отступы секций 32–64</div>
</body></html>
