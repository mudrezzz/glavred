<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface);}
  .stack{display:flex;flex-direction:column;gap:13px;}
  .line{display:flex;align-items:baseline;gap:16px;}
  .spec{font:var(--mono-sm);color:var(--ink-400);width:120px;flex:none;}
  .a{font:var(--ui-3xl);color:var(--ink-900);letter-spacing:-.02em;}
  .b{font:var(--ui-2xl);color:var(--ink-900);letter-spacing:-.01em;}
  .c{font:var(--ui-xl);color:var(--ink-900);}
  .d{font:var(--ui-lg);color:var(--ink-900);}
  .e{font:var(--ui-md);color:var(--ink-700);}
  .f{font:var(--ui-sm);color:var(--ink-600);}
</style></head>
<body class="gr-ui">
  <div class="stack">
    <div class="line"><span class="spec">3xl · 30/600</span><span class="a">Контент-план недели</span></div>
    <div class="line"><span class="spec">2xl · 24/600</span><span class="b">Радар нашёл 12 поводов</span></div>
    <div class="line"><span class="spec">xl · 20/600</span><span class="c">Утвердите фабулу поста</span></div>
    <div class="line"><span class="spec">lg · 17/600</span><span class="d">Антимнение · вторник</span></div>
    <div class="line"><span class="spec">md · 15/500</span><span class="e">Базовый текст интерфейса — Golos Text.</span></div>
    <div class="line"><span class="spec">sm · 13/500</span><span class="f">Вспомогательная подпись и метаданные.</span></div>
  </div>
</body></html>
