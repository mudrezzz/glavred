<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--surface);}
  .wrap{display:flex;gap:16px;}
  .col{flex:1;display:flex;flex-direction:column;gap:7px;}
  label{font:var(--ui-xs);color:var(--ink-600);}
  .field{font:var(--ui-md);color:var(--ink-900);background:var(--surface-sunk);border:1px solid var(--ink-200);border-radius:var(--r-md);padding:10px 13px;}
  .field.focus{background:var(--surface);border-color:var(--info);box-shadow:var(--ring-focus);}
  .field.ph{color:var(--ink-500);}
  .sel{display:flex;align-items:center;justify-content:space-between;}
  .sel svg{width:16px;height:16px;color:var(--ink-500);}
  .tog{display:flex;align-items:center;gap:10px;font:var(--ui-sm);color:var(--ink-700);margin-top:4px;}
  .sw{width:38px;height:22px;border-radius:var(--r-pill);background:var(--accent);position:relative;flex:none;}
  .sw::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;right:2px;box-shadow:var(--shadow-xs);}
</style></head>
<body class="gr-ui">
  <div class="wrap">
    <div class="col">
      <label>Имя автора</label>
      <div class="field">Анна Корн</div>
    </div>
    <div class="col">
      <label>Рубрика</label>
      <div class="field sel"><span>Антимнение</span><svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div class="col">
      <label>Главный тезис</label>
      <div class="field focus">AI — новая ОС бизнеса</div>
    </div>
  </div>
  <div class="tog"><span class="sw"></span>Прогонять драфт через анти-AI-редактора</div>
</body></html>
