<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface);}
  .wrap{display:flex;gap:32px;align-items:flex-start;}
  .col{flex:1;}
  .lead{font:var(--ed-lead);color:var(--ink-800);margin:0 0 12px;}
  .bd{font:var(--ed-body);color:var(--ink-900);margin:0;}
  blockquote{font:var(--ed-quote);font-style:italic;color:var(--ink-800);border-left:3px solid var(--accent);margin:0;padding:2px 0 2px 16px;}
  .meta{font:var(--mono-sm);text-transform:uppercase;letter-spacing:.1em;color:var(--ink-500);margin-top:16px;}
</style></head>
<body class="gr-ui">
  <div class="wrap">
    <div class="col">
      <p class="lead">Выиграют не те, кто покупает инструменты, а те, кто перестраивает процессы.</p>
      <p class="bd">AI — это не магия и не игрушка, а новая операционная система бизнеса.</p>
    </div>
    <div class="col">
      <blockquote>Хороший пост начинается с замысла, а не с первого абзаца.</blockquote>
    </div>
  </div>
  <div class="meta">Lora · lead 21/1.6 · body 19/1.72 · quote 24 italic</div>
</body></html>
