<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:30px 28px;background:var(--paper);}
  .row{display:flex;gap:22px;align-items:center;}
  .e{flex:1;background:var(--surface);border:1px solid var(--ink-200);border-radius:var(--r-lg);height:74px;display:flex;align-items:center;justify-content:center;font:var(--mono-sm);color:var(--ink-500);}
  .meta{font:var(--mono-sm);text-transform:uppercase;letter-spacing:.1em;color:var(--ink-500);margin-top:22px;}
</style></head>
<body class="gr-ui">
  <div class="row">
    <div class="e" style="box-shadow:var(--shadow-xs)">xs</div>
    <div class="e" style="box-shadow:var(--shadow-sm)">sm</div>
    <div class="e" style="box-shadow:var(--shadow-md)">md</div>
    <div class="e" style="box-shadow:var(--shadow-lg)">lg</div>
    <div class="e" style="box-shadow:var(--shadow-xl)">xl</div>
  </div>
  <div class="meta">Мягкие, тёпло-тонированные тени · sm — карточки в покое · md — hover/popover · lg/xl — модалки</div>
</body></html>
