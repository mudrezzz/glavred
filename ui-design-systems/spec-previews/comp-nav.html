<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--paper);}
  .nav{display:flex;flex-direction:column;gap:4px;width:230px;background:var(--surface);border:1px solid var(--ink-200);border-radius:var(--r-lg);padding:10px;box-shadow:var(--shadow-sm);}
  .item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-md);font:var(--ui-md);font-weight:500;color:var(--ink-700);position:relative;cursor:pointer;}
  .item svg{width:18px;height:18px;color:var(--ink-500);}
  .item:hover{background:var(--ink-100);}
  .item.active{background:var(--accent-wash);color:var(--ink-900);font-weight:600;}
  .item.active svg{color:var(--accent);}
  .item.active::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:2px;background:var(--accent);}
  .badge{margin-left:auto;font:var(--mono-sm);background:var(--accent);color:#fff;border-radius:var(--r-pill);padding:1px 7px;}
</style></head>
<body class="gr-ui">
  <div class="nav">
    <div class="item"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16M4 12h16M4 19h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Редакционная библия</div>
    <div class="item active"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Радар<span class="badge">12</span></div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="2"/><path d="M3 9h18M8 2v4M16 2v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>План</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none"><path d="M5 14 L12 7 L19 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Фабулы</div>
  </div>
</body></html>
